<app-header />
<main>
  <ul id="users">
    @for (user of users; track user.id) {
  <li>
    <app-user
      [selected]="user.id === selectedUser()?.id"
      [user]="user"
      (select)="onSelectUser($event)"
    />
  </li>
}
  </ul>

  @if (selectedUser()) {
    <app-tasks [userId]="selectedUser()!.id" [userName]="selectedUser()!.name" />

  } @else {
    <p id="fallback">No user selected.</p>
  }

</main>
<router-outlet/>
